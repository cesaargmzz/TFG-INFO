<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fondo degradado espacio -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#020817"/>
      <stop offset="50%"  stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1f"/>
    </linearGradient>

    <!-- Degradado del título -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="50%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>

    <!-- Glow del globo -->
    <radialGradient id="earthGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1d4ed8" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#1e3a8a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#020817" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow del texto -->
    <filter id="textGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow suave para estrellas -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip para el globo -->
    <clipPath id="earthClip">
      <circle cx="980" cy="150" r="200"/>
    </clipPath>

    <!-- Gradiente superficie tierra -->
    <radialGradient id="earthSurface" cx="40%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#1a4a7a"/>
      <stop offset="40%"  stop-color="#1e3a6e"/>
      <stop offset="70%"  stop-color="#0f2d54"/>
      <stop offset="100%" stop-color="#050e1f"/>
    </radialGradient>

    <radialGradient id="earthLight" cx="35%" cy="35%" r="50%">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Estrellas pequeñas -->
  <g filter="url(#starGlow)" fill="white">
    <circle cx="45"  cy="22"  r="0.8" opacity="0.7"/>
    <circle cx="132" cy="67"  r="1.1" opacity="0.9"/>
    <circle cx="78"  cy="145" r="0.6" opacity="0.5"/>
    <circle cx="210" cy="38"  r="0.9" opacity="0.8"/>
    <circle cx="290" cy="112" r="0.7" opacity="0.6"/>
    <circle cx="55"  cy="220" r="1.0" opacity="0.8"/>
    <circle cx="170" cy="258" r="0.6" opacity="0.5"/>
    <circle cx="340" cy="195" r="0.8" opacity="0.7"/>
    <circle cx="420" cy="55"  r="1.2" opacity="0.9"/>
    <circle cx="490" cy="240" r="0.7" opacity="0.6"/>
    <circle cx="560" cy="28"  r="0.9" opacity="0.75"/>
    <circle cx="620" cy="270" r="0.6" opacity="0.5"/>
    <circle cx="680" cy="88"  r="1.0" opacity="0.8"/>
    <circle cx="720" cy="195" r="0.7" opacity="0.6"/>
    <circle cx="760" cy="42"  r="0.8" opacity="0.7"/>
    <circle cx="800" cy="260" r="1.1" opacity="0.85"/>
    <circle cx="25"  cy="280" r="0.7" opacity="0.6"/>
    <circle cx="380" cy="275" r="0.9" opacity="0.7"/>
    <circle cx="155" cy="18"  r="0.6" opacity="0.55"/>
    <circle cx="470" cy="130" r="0.8" opacity="0.65"/>
    <circle cx="310" cy="15"  r="1.0" opacity="0.8"/>
    <circle cx="245" cy="290" r="0.6" opacity="0.5"/>
    <circle cx="530" cy="175" r="0.7" opacity="0.6"/>
    <circle cx="100" cy="195" r="0.9" opacity="0.7"/>
    <circle cx="640" cy="145" r="0.6" opacity="0.5"/>
  </g>

  <!-- Globo terráqueo (decorativo, derecha) -->
  <circle cx="980" cy="150" r="195" fill="url(#earthGlow)"/>
  <circle cx="980" cy="150" r="160" fill="url(#earthSurface)" opacity="0.7"/>
  <circle cx="980" cy="150" r="160" fill="url(#earthLight)"/>

  <!-- Contornos continentes simplificados -->
  <g clip-path="url(#earthClip)" fill="#2d6a4f" opacity="0.5">
    <!-- Europa/Africa blob -->
    <ellipse cx="940" cy="115" rx="28" ry="38" transform="rotate(-15 940 115)"/>
    <ellipse cx="948" cy="168" rx="22" ry="42" transform="rotate(5 948 168)"/>
    <!-- América blob -->
    <ellipse cx="870" cy="110" rx="20" ry="35" transform="rotate(-20 870 110)"/>
    <ellipse cx="865" cy="175" rx="18" ry="30" transform="rotate(10 865 175)"/>
    <!-- Asia blob -->
    <ellipse cx="1020" cy="105" rx="38" ry="28" transform="rotate(-10 1020 105)"/>
  </g>

  <!-- Atmósfera del globo -->
  <circle cx="980" cy="150" r="165" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.2"/>
  <circle cx="980" cy="150" r="172" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.1"/>

  <!-- Línea separadora vertical -->
  <line x1="820" y1="40" x2="820" y2="260" stroke="rgba(96,165,250,0.12)" stroke-width="1"/>

  <!-- Contenido izquierdo -->
  <!-- Label superior -->
  <text x="80" y="90"
    font-family="Inter, sans-serif"
    font-size="11"
    font-weight="500"
    letter-spacing="3"
    fill="rgba(148,163,184,0.6)"
    text-anchor="start">TRABAJO DE FIN DE GRADO · 2026</text>

  <!-- Título GDPulse -->
  <text x="80" y="175"
    font-family="Manrope, Inter, sans-serif"
    font-size="86"
    font-weight="800"
    letter-spacing="-2"
    fill="url(#titleGrad)"
    filter="url(#textGlow)"
    text-anchor="start">GDPulse</text>

  <!-- Subtítulo -->
  <text x="82" y="215"
    font-family="Inter, sans-serif"
    font-size="13.5"
    font-weight="400"
    letter-spacing="0.5"
    fill="rgba(148,163,184,0.65)"
    text-anchor="start">Estimación del PIB con ML · España · Francia · Italia</text>

  <!-- Línea decorativa bajo el título -->
  <rect x="80" y="225" width="280" height="1.5" fill="url(#titleGrad)" opacity="0.4" rx="1"/>
</svg>
